spring:
  application:
    name: sportswear-app
  datasource:
    url: jdbc:mysql://localhost:3306/sportswear_shop_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  devtools:
    restart:
      enabled: true

server:
  port: 8080

# JWT Config
jwt:
  secret: yourSuperSecretKeyForSportwearApp2026ChangeThisInProduction!!!
  expiration: 86400000   # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days

# App config
app:
  frontend-url: http://localhost:3000