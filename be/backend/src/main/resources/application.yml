spring:
  application:
    name: sportswear-app
  datasource:
    url: jdbc:mysql://localhost:3306/sportswear_shop_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  devtools:
    restart:
      enabled: true

server:
  port: 8080

# JWT Config
app:
  jwt:
    secret: yourSuperSecretKeyForSportwearApp2026ChangeThisInProductionMustBe64BytesLong!!!!
    expiration: 86400000
    refresh-expiration: 604800000
  frontend-url: http://localhost:3000


logging:
  level:
    root: INFO
    com.sportswear.backend: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/sportswear-app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 500MB
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
